name: eaves
channels:
  - conda-forge
  - defaults
dependencies:
  # Pinned to the environment that produced the released KSA dataset
  # (region/ksa/output/report.md "Software versions"; Python 3.13.7).
  - python=3.13
  - numpy=2.4.3
  - scipy=1.17.1
  - pandas=3.0.2
  - geopandas=1.1.1
  - shapely=2.1.1
  - pyproj=3.7.2
  - rasterio=1.4.3
  - matplotlib=3.10.8
  - scikit-learn=1.8.0
  - tqdm
  - pytest
  - pip
